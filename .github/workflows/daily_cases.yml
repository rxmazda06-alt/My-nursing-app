name: Generate Daily NCLEX Cases

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: write
  id-token: write

jobs:
  generate-cases:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          persist-credentials: false

      - name: Generate Cases with Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Read the CLAUDE.md file for full instructions and the exact JSON format.
            
            TODAY'S TASK:
            1. Create the directory src/data/cases/ if it doesn't exist
            2. Generate 5 new NCLEX clinical case studies as separate JSON files
            3. Use the bash tool to write each file: src/data/cases/case_$(date +%Y%m%d)_1.json through _5.json
            4. Each file must follow the EXACT JSON structure shown in CLAUDE.md
            5. Make sure to actually CREATE the files using the bash tool with cat or echo commands
            
            IMPORTANT: You MUST use the bash tool to create files. Do NOT just output JSON as text.
            Example: bash -c 'cat > src/data/cases/case_20260423_1.json << JSONEOF
            { ... json content ... }
            JSONEOF'
          claude_args: "--model claude-sonnet-4-5 --max-turns 50"

      - name: Commit and push generated cases
        env:
          PAT: ${{ secrets.PAT_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${PAT}@github.com/rxmazda06-alt/My-nursing-app.git"
          ls -la src/data/cases/
          git add src/data/cases/
          git diff --staged --quiet || git commit -m "Auto-generate 5 new NCLEX cases [$(date +%Y-%m-%d)]"
          git push origin HEAD:main
